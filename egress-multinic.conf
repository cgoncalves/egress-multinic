# /etc/egress-multinic/egress-multinic.conf
#
# Configuration for the egress multi-NIC reconciler.
# Modify this file and restart the egress-multinic service to apply changes.

# --- Egress Gateway ---

# Pod IPs or CIDRs to route through egress nodes (IPv4).
# Uses nftables set syntax. Examples:
#   CIDR range:   POD_CIDRS="10.132.0.0/14"
#   Single IP:    POD_CIDRS="10.132.2.29"
#   Multiple:     POD_CIDRS="{ 10.132.2.0/24, 10.132.3.0/24 }"
POD_CIDRS="10.132.0.0/14"

# CIDRs excluded from routing (IPv4: Pod, Service, Machine, link-local).
# Traffic to these destinations is never routed.
EXCLUDE_CIDRS="10.132.0.0/14, 172.30.0.0/16, 10.6.105.0/24, 169.254.169.0/29"

# IPv6 Pod CIDRs to route (optional, leave empty to disable IPv6 routing).
POD_CIDRS_V6=""

# IPv6 CIDRs excluded from routing (optional, required if POD_CIDRS_V6 is set).
EXCLUDE_CIDRS_V6=""

# --- EgressIP Multi-NIC SNAT ---

# Map of alternate interfaces to their SNAT /32 IP addresses.
# EgressIP-bound pod traffic exiting via these interfaces will be SNAT'd to
# the specified IP. Non-EgressIP traffic (routed by egress-gateway) will be
# masqueraded to the interface's host IP.
#
# Format: "INTERFACE:SNAT_IP" (one per line in the array)
# Leave empty if EgressIP multi-NIC SNAT is not needed.
EGRESSIP_SNAT=()

# OVN management port name. EgressIP traffic enters the gateway node via this
# interface (Geneve tunnel). Used to distinguish EgressIP traffic from
# egress-gateway traffic in the nftables forward chain.
OVN_MGMT_PORT="ovn-k8s-mp0"

# --- API Access ---

# API server URL (e.g., https://api-int.cluster.example.com:6443).
API_SERVER="https://api.cnfdc6.t5g-dev.eng.rdu2.dc.redhat.com:6443"

# Path to the API server CA certificate.
CA_FILE="/etc/egress-multinic/ca.crt"

# Path to the ServiceAccount token file.
TOKEN_FILE="/etc/egress-multinic/token"

# --- Tuning ---

# Packet mark used for policy routing (must not conflict with other fwmarks).
FWMARK="0x2000"

# Routing table number and rule priority for routed traffic.
RT_TABLE="100"
RT_PRIO="1000"

# Seconds between reconciliation cycles.
RECONCILE_INTERVAL=10

# Seconds to wait for ping reply when probing egress node health.
PING_TIMEOUT=2

# ECMP multipath hash policy (0=L3, 1=L4). L4 hashing spreads flows to the
# same destination IP across egress nodes by including src/dst ports.
FIB_MULTIPATH_HASH_POLICY=1

# nftables table names (must not conflict with existing tables).
NFT_TABLE_WORKER="egress-gateway"
NFT_TABLE_EGRESS="egress-snat"
